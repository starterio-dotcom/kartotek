# SPA-kiszolgálás + az API visszafelé-proxyzása ugyanarra az originra.
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Statikus assetek hosszú cache-elése (a fájlnevek hash-eltek).
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Az API, az életjel és a Swagger UI az `api` szolgáltatásra megy.
  location /api/ {
    proxy_pass http://api:3001;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    client_max_body_size 25m; # a 20 MB-os melléklet-feltöltéshez
  }
  location = /health { proxy_pass http://api:3001/health; }
  location /dok { proxy_pass http://api:3001/dok; }

  # SPA-fallback: minden más útvonal az index.html-re.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
