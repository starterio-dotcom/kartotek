<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kartoték · FAIR / 3R</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;1,500&display=swap" rel="stylesheet">
<style>
  /* ===== DÁP tokenek mint alap + modern felületi réteg ===== */
  :root{
    --bg:#F7F8FA; --felulet:#FFFFFF; --felulet-2:#F2F4F8;
    --keret:#E6E9EF; --keret-eros:#D3D9E3; --keret-ui:#7B8694;
    --brand:#4258ED; --brand-hover:#3447D4; --brand-melyebb:#3130AB;
    --brand-tint:#EEF2FF; --brand-tint-2:#E3EAFF;
    --t-eros:#16191F; --t-alap:#3F4754; --t-halk:#5C6677; --t-leges:#5F6B7D;
    --pozitiv:#066E2B; --pozitiv-bg:#E7F8EE;
    --info:#065E90; --info-bg:#E9F4FC;
    --figyelem:#A65200; --figyelem-keret:#F98900; --figyelem-bg:#FFF3E3;
    --negativ:#D6220F; --negativ-bg:#FDEDEA;
    --semleges-bg:#EEF1F5; --lezart:#373D49;
    --fokusz:#647AFF;
    --arnyek-s:0 1px 2px rgba(16,24,40,.05);
    --arnyek-m:0 4px 16px -2px rgba(16,24,40,.08), 0 1px 2px rgba(16,24,40,.05);
    --r-s:6px; --r-m:10px; --r-l:14px; --r-pill:999px;
    --mono:ui-monospace,'SF Mono','Cascadia Code',Consolas,monospace;
    --sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{height:100%}
  body{height:100%;font-family:var(--sans);background:var(--bg);color:var(--t-alap);
    font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased}
  button{font-family:inherit;cursor:pointer;color:inherit}
  input,select,textarea{font-family:inherit;font-size:14px;color:var(--t-alap)}
  button:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible{
    outline:none;box-shadow:0 0 0 2px #fff,0 0 0 4px var(--fokusz)}
  ::placeholder{color:var(--t-leges)}

  /* ---------- Fejléc ---------- */
  header{
    display:flex;align-items:center;gap:14px;height:58px;padding:0 18px;
    background:rgba(255,255,255,.86);backdrop-filter:blur(10px);
    border-bottom:1px solid var(--keret);position:sticky;top:0;z-index:50;
  }
  .brand{display:flex;align-items:center;gap:10px;min-width:0}
  .brand-jel{width:30px;height:30px;border-radius:9px;flex:none;
    background:linear-gradient(135deg,var(--brand) 0%,var(--brand-melyebb) 100%);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.25)}
  .brand h1{font-size:15px;font-weight:700;letter-spacing:-.01em;color:var(--t-eros);line-height:1.1}
  .brand .al{font-size:11.5px;color:var(--t-halk);font-weight:500}
  .kereso-wrap{position:relative;width:min(340px,32vw)}
  .kereso-wrap svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--t-leges)}
  .kereso{width:100%;padding:8px 56px 8px 34px;border:1px solid var(--keret);
    border-radius:var(--r-m);background:var(--felulet-2);transition:background .15s,border-color .15s}
  .kereso:hover{background:#fff;border-color:var(--keret-eros)}
  .kereso:focus{background:#fff;border-color:var(--brand)}
  .kereso-wrap kbd{position:absolute;right:9px;top:50%;transform:translateY(-50%);
    font-family:var(--sans);font-size:10.5px;font-weight:600;color:var(--t-leges);
    border:1px solid var(--keret);border-radius:5px;padding:1px 5px;background:#fff}
  .header-spacer{flex:1}
  .hctrl{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--t-halk);font-weight:500}
  .hctrl input[type=date],.hctrl select{background:#fff;border:1px solid var(--keret);
    border-radius:var(--r-s);padding:6px 8px;font-size:13px;font-weight:500}
  .hctrl input[type=date]:hover,.hctrl select:hover{border-color:var(--keret-eros)}
  .gomb{display:inline-flex;align-items:center;gap:7px;border-radius:var(--r-m);
    padding:8px 14px;font-size:13px;font-weight:600;border:1px solid transparent;
    transition:background .15s,border-color .15s,transform .05s}
  .gomb:active{transform:translateY(1px)}
  .gomb.elsodleges{background:var(--brand);color:#fff}
  .gomb.elsodleges:hover{background:var(--brand-hover)}
  .gomb.masodlagos{background:#fff;border-color:var(--keret-eros);color:var(--t-alap)}
  .gomb.masodlagos:hover{border-color:var(--t-leges);background:var(--felulet-2)}
  .gomb.veszelyes{background:#fff;border-color:#F3B6AE;color:var(--negativ)}
  .gomb.veszelyes:hover{background:var(--negativ-bg)}
  .gomb.halk{background:transparent;color:var(--t-halk)}
  .gomb.halk:hover{background:var(--felulet-2);color:var(--t-alap)}

  /* ---------- Alaprajz ---------- */
  .layout{display:grid;grid-template-columns:350px 1fr;height:calc(100vh - 58px)}
  @media(max-width:880px){.layout{display:block;height:auto}}

  /* ---------- Lista panel ---------- */
  aside{border-right:1px solid var(--keret);background:var(--felulet);
    display:flex;flex-direction:column;min-height:0}
  .panel-fej{padding:14px 14px 10px;display:flex;flex-direction:column;gap:10px}
  .szegmens{display:flex;background:var(--felulet-2);border-radius:var(--r-m);padding:3px;gap:2px}
  .szegmens button{flex:1;border:none;background:transparent;border-radius:8px;
    padding:6px 4px;font-size:12px;font-weight:600;color:var(--t-halk);transition:all .15s}
  .szegmens button:hover{color:var(--t-alap)}
  .szegmens button.aktiv{background:#fff;color:var(--t-eros);box-shadow:var(--arnyek-s)}
  .szegmens .db{font-size:10.5px;font-weight:700;color:var(--t-leges);margin-left:3px}
  .szegmens button.aktiv .db{color:var(--brand)}
  .szuro-sor{display:flex;flex-wrap:wrap;gap:5px}
  .chip{border:1px solid var(--keret);background:#fff;border-radius:var(--r-pill);
    padding:3px 11px;font-size:11.5px;font-weight:600;color:var(--t-halk);transition:all .12s}
  .chip:hover{border-color:var(--brand);color:var(--brand)}
  .chip.aktiv{background:var(--brand-tint);color:var(--brand);border-color:var(--brand)}
  .lista{overflow-y:auto;flex:1;padding:4px 10px 14px;display:flex;flex-direction:column;gap:6px}
  .lista-elem{text-align:left;background:#fff;border:1px solid transparent;
    border-radius:var(--r-m);padding:10px 12px;width:100%;position:relative;transition:all .12s}
  .lista-elem:hover{background:var(--felulet-2)}
  .lista-elem.kivalasztott{background:var(--brand-tint);border-color:var(--brand-tint-2)}
  .lista-elem.kivalasztott::before{content:'';position:absolute;left:0;top:10px;bottom:10px;
    width:3px;border-radius:3px;background:var(--brand)}
  .le-sor1{display:flex;align-items:center;gap:8px}
  .lista-kulcs{font-family:var(--mono);font-size:10.5px;font-weight:500;color:var(--t-halk);letter-spacing:.02em}
  .le-sor1 .tolto{flex:1}
  .lista-cim{font-size:13.5px;font-weight:600;color:var(--t-eros);margin:3px 0 4px;letter-spacing:-.005em}
  .lista-meta{display:flex;gap:6px;align-items:center;flex-wrap:wrap;font-size:11px;color:var(--t-leges)}
  .lista-ures{color:var(--t-halk);font-size:13px;padding:26px 14px;text-align:center}

  /* ---------- Státusz jelvények (DÁP szemantika) ---------- */
  .badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;
    padding:2px 9px;border-radius:var(--r-pill)}
  .badge::before{content:'';width:6px;height:6px;border-radius:50%;background:currentColor}
  .b-Vázlat{background:var(--semleges-bg);color:var(--t-halk)}
  .b-Véleményezés{background:var(--figyelem-bg);color:var(--figyelem)}
  .b-Jóváhagyott{background:var(--info-bg);color:var(--info)}
  .b-Hatályos{background:var(--pozitiv-bg);color:var(--pozitiv)}
  .b-Elavult{background:#E3E6EC;color:#5A6372}
  .b-Archivált{background:var(--lezart);color:#fff}
  .b-Elvetve{background:var(--negativ-bg);color:var(--negativ)}
  .badge.mini{font-size:10px;padding:1px 7px}
  .badge.nagy{font-size:13px;padding:5px 13px}

  /* ---------- Fő nézet ---------- */
  main{overflow-y:auto;min-height:0}
  .ures-allapot{margin:90px auto;max-width:380px;text-align:center;color:var(--t-halk)}
  .ures-allapot h2{font-size:18px;font-weight:700;color:var(--t-eros);margin-bottom:6px}

  .reszlet-fej{position:sticky;top:0;z-index:10;background:rgba(247,248,250,.92);
    backdrop-filter:blur(8px);padding:18px 28px 0;border-bottom:1px solid var(--keret)}
  .rf-felso{display:flex;align-items:flex-start;gap:16px;flex-wrap:wrap}
  .rf-cimblokk{flex:1;min-width:280px}
  .kulcs-chip{display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);
    font-size:11.5px;font-weight:500;color:var(--t-halk);background:var(--felulet-2);
    border:1px solid var(--keret);border-radius:var(--r-s);padding:2px 8px;margin-bottom:8px}
  .reszlet-cim{font-size:23px;font-weight:700;letter-spacing:-.02em;color:var(--t-eros);line-height:1.25}
  .reszlet-altipus{font-size:12.5px;color:var(--t-halk);margin-top:4px;font-weight:500}
  .rf-akciok{display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding-top:4px}
  .szerep-hint{font-size:11.5px;color:var(--t-leges);font-weight:500}

  /* ---------- Életciklus-stepper (szignatúra elem) ---------- */
  .stepper{display:flex;align-items:flex-start;margin:20px 0 0;padding-bottom:16px;overflow-x:auto}
  .lepes{display:flex;flex-direction:column;align-items:center;gap:6px;min-width:84px;position:relative}
  .lepes .pont{width:22px;height:22px;border-radius:50%;border:2px solid var(--keret-ui);
    background:#fff;display:flex;align-items:center;justify-content:center;z-index:1;transition:all .2s}
  .lepes .pont svg{display:none}
  .lepes .felirat{font-size:10.5px;font-weight:600;color:var(--t-leges);text-align:center;white-space:nowrap}
  .lepes.kesz .pont{background:var(--brand-tint-2);border-color:var(--brand)}
  .lepes.kesz .pont svg{display:block;color:var(--brand)}
  .lepes.kesz .felirat{color:var(--t-halk)}
  .lepes.aktualis .pont{border-color:var(--st-szin,var(--brand));background:var(--st-szin,var(--brand));
    box-shadow:0 0 0 4px var(--st-tint,var(--brand-tint))}
  .lepes.aktualis .felirat{color:var(--st-szin,var(--brand));font-weight:700}
  .osszekoto{flex:1;min-width:26px;height:2px;background:var(--keret-ui);margin-top:10px;position:relative}
  .osszekoto.kesz{background:var(--brand)}
  .osszekoto .auto-cimke{position:absolute;top:-9px;left:50%;transform:translateX(-50%);
    font-size:8.5px;font-weight:800;letter-spacing:.08em;color:var(--figyelem);
    background:var(--figyelem-bg);border-radius:4px;padding:1px 5px}
  .stepper-elvetve{display:flex;align-items:center;gap:10px;margin:20px 0 0;padding-bottom:16px;
    color:var(--negativ);font-size:13px;font-weight:600}

  /* ---------- Tartalom rács ---------- */
  .reszlet-test{display:grid;grid-template-columns:minmax(0,1fr) 320px;gap:22px;
    padding:22px 28px 40px;max-width:1180px}
  @media(max-width:1020px){.reszlet-test{grid-template-columns:1fr}}
  .tartalom,.oldalsav{display:flex;flex-direction:column;gap:14px;min-width:0}
  .blokk{background:var(--felulet);border:1px solid var(--keret);border-radius:var(--r-l);
    box-shadow:var(--arnyek-s);padding:16px 18px}
  .blokk-cim{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;
    color:var(--t-leges);margin-bottom:9px}
  .blokk .torzs{font-size:14px}
  .torzs p{margin:0 0 9px}.torzs p:last-child{margin-bottom:0}
  .torzs ol,.torzs ul{margin:0 0 9px 20px}
  .torzs li{margin-bottom:4px}
  .torzs .ures{color:var(--t-leges);font-style:italic}
  .ketted{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  @media(max-width:640px){.ketted{grid-template-columns:1fr}}

  .cia-racs{display:flex;gap:10px}
  .cia-cella{flex:1;background:var(--felulet-2);border-radius:var(--r-m);padding:9px;text-align:center}
  .cia-cella b{font-size:19px;display:block;color:var(--t-eros);letter-spacing:-.02em}
  .cia-cella span{font-size:10px;font-weight:600;letter-spacing:.05em;color:var(--t-halk)}

  /* Oldalsáv elemei */
  .verzio-lista{display:flex;flex-direction:column;gap:5px}
  .verzio-tab{display:flex;align-items:center;gap:9px;border:1px solid var(--keret);
    background:#fff;border-radius:var(--r-m);padding:7px 11px;font-size:12.5px;
    font-weight:600;color:var(--t-alap);transition:all .12s;text-align:left}
  .verzio-tab:hover{border-color:var(--keret-eros);background:var(--felulet-2)}
  .verzio-tab.aktiv{border-color:var(--brand);background:var(--brand-tint)}
  .verzio-tab .vszam{font-family:var(--mono);font-size:11.5px}
  .verzio-tab .tolto{flex:1}

  .hataly-sor{display:flex;justify-content:space-between;font-size:12px;color:var(--t-halk);
    font-weight:600;margin-bottom:6px}
  .hataly-sor b{color:var(--t-eros);font-weight:700;display:block;font-size:12.5px}
  .hataly-vonal{height:6px;border-radius:3px;background:var(--felulet-2);position:relative;overflow:hidden}
  .hataly-vonal .toltes{position:absolute;inset:0;border-radius:3px;
    background:linear-gradient(90deg,var(--pozitiv),#3DC56C)}
  .hataly-vonal .toltes.nyitott{background:linear-gradient(90deg,var(--pozitiv) 60%,rgba(11,138,53,.15))}
  .visszavonasig{color:var(--pozitiv)}
  .auto-hint{display:flex;gap:8px;align-items:flex-start;font-size:12px;font-weight:600;
    color:var(--figyelem);background:var(--figyelem-bg);border-radius:var(--r-s);
    padding:7px 10px;margin-top:9px;line-height:1.4}

  .tag-chip{display:inline-block;background:var(--felulet-2);border-radius:var(--r-pill);
    padding:3px 11px;font-size:11.5px;font-weight:600;margin:0 5px 5px 0;color:var(--t-halk)}

  .kapcs-csoport{margin-bottom:10px}
  .kapcs-csoport:last-child{margin-bottom:0}
  .kapcs-fajta{font-size:10.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;
    color:var(--t-leges);display:block;margin-bottom:4px}
  .kapcs-link{display:block;background:none;border:none;color:var(--brand);font-size:13px;
    font-weight:600;padding:2px 0;text-align:left}
  .kapcs-link:hover{color:var(--brand-melyebb);text-decoration:underline;text-underline-offset:2px}
  .kapcs-kulso{font-family:var(--mono);font-size:12px;color:var(--t-alap);display:block;padding:2px 0}
  .bejovo{color:var(--t-halk);font-size:12px;margin-top:7px;border-top:1px dashed var(--keret);padding-top:8px}
  .bejovo .kapcs-link{display:inline}

  .audit-sor{font-size:12px;color:var(--t-halk);display:flex;flex-direction:column;gap:4px;font-weight:500}

  /* ---------- Napló idővonal ---------- */
  .ido-lista{display:flex;flex-direction:column}
  .ido-sor{display:flex;gap:11px;position:relative;padding-bottom:13px}
  .ido-sor:last-child{padding-bottom:0}
  .ido-sor::before{content:'';position:absolute;left:5px;top:14px;bottom:-2px;width:2px;background:var(--keret)}
  .ido-sor:last-child::before{display:none}
  .ido-pont{width:12px;height:12px;border-radius:50%;flex:none;margin-top:3px;
    border:3px solid var(--felulet);box-shadow:0 0 0 1.5px var(--keret-eros);background:var(--t-leges)}
  .ido-tartalom{font-size:12px;min-width:0}
  .ido-cim{font-weight:700;color:var(--t-eros);font-size:12.5px}
  .ido-meta{color:var(--t-leges);font-weight:500}
  .ido-megj{color:var(--t-halk);margin-top:1px}
  .naplo-rendszer{font-family:var(--mono);font-size:10.5px;font-weight:700;color:var(--brand);
    background:var(--brand-tint);border-radius:4px;padding:0 5px}

  /* ---------- Modal ---------- */
  .modal-hatter{position:fixed;inset:0;background:rgba(16,19,26,.55);z-index:100;
    display:flex;align-items:center;justify-content:center;padding:20px;
    animation:fadeIn .15s ease}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  .modal{background:#fff;border-radius:var(--r-l);box-shadow:0 24px 60px -12px rgba(16,24,40,.3);
    padding:24px;width:100%;max-width:440px;animation:slideUp .18s ease}
  @keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .modal h3{font-size:17px;font-weight:700;color:var(--t-eros);letter-spacing:-.01em;margin-bottom:12px}
  .modal p{font-size:13px;color:var(--t-halk)}
  .modal label{display:block;font-size:12.5px;font-weight:600;margin:13px 0 5px;color:var(--t-alap)}
  .modal input[type=date],.modal input[type=text],.modal textarea,.modal select{
    width:100%;border:1px solid var(--keret-eros);border-radius:var(--r-m);padding:8px 11px;background:#fff;
    transition:border-color .15s}
  .modal input:focus,.modal textarea:focus,.modal select:focus{border-color:var(--brand)}
  .modal input:disabled{background:var(--felulet-2);color:var(--t-leges)}
  .modal textarea{min-height:76px;resize:vertical}
  .modal .jelolo{display:flex;align-items:center;gap:8px;font-size:13.5px;margin-top:10px;
    color:var(--t-alap);font-weight:500}
  .modal .jelolo input{width:17px;height:17px;accent-color:var(--brand)}
  .modal-gombok{display:flex;justify-content:flex-end;gap:9px;margin-top:20px}
  .modal-gombok .btn{border-radius:var(--r-m);padding:9px 18px;font-size:13.5px;font-weight:600;border:1px solid transparent}
  .modal-gombok .btn:not(.masodlagos){background:var(--brand);color:#fff}
  .modal-gombok .btn:not(.masodlagos):hover{background:var(--brand-hover)}
  .modal-gombok .btn.masodlagos{background:#fff;border-color:var(--keret-eros);color:var(--t-alap)}
  .modal-gombok .btn.masodlagos:hover{background:var(--felulet-2)}
  .modal .hiba{color:var(--negativ);background:var(--negativ-bg);border-radius:var(--r-s);
    font-size:12.5px;font-weight:600;margin-top:10px;padding:7px 11px;display:none}

  /* ---------- Toast ---------- */
  #toast{position:fixed;bottom:22px;right:22px;transform:translateY(8px);
    background:var(--t-eros);color:#fff;border-radius:var(--r-m);padding:11px 16px;
    font-size:13px;font-weight:500;opacity:0;pointer-events:none;
    transition:opacity .2s,transform .2s;z-index:200;max-width:380px;box-shadow:var(--arnyek-m)}
  #toast.lathato{opacity:1;transform:none}

  /* ---------- Szolgáltatás-áttekintés ---------- */
  .att-gomb{display:flex;justify-content:space-between;align-items:center;gap:8px;
    border:1px solid var(--keret);background:#fff;border-radius:var(--r-m);
    padding:9px 12px;font-size:12.5px;font-weight:500;color:var(--t-alap);transition:all .12s;width:100%}
  .att-gomb b{font-weight:700;color:var(--t-eros)}
  .att-gomb:hover{border-color:var(--brand);background:var(--brand-tint)}
  .att-gomb .nyil{color:var(--t-leges)}
  .attekintes{padding:28px;max-width:1080px}
  .szolg-cimke{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--brand)}
  .szolg-fej h2{font-size:26px;font-weight:700;letter-spacing:-.02em;color:var(--t-eros);margin:4px 0 6px}
  .szolg-fej p{font-size:14px;color:var(--t-halk);max-width:640px}
  .szolg-alcim{font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
    color:var(--t-leges);margin:26px 0 12px}
  .app-racs{display:grid;grid-template-columns:repeat(auto-fit,minmax(330px,1fr));gap:16px}
  .app-kartya{background:var(--felulet);border:1px solid var(--keret);border-radius:var(--r-l);
    box-shadow:var(--arnyek-s);padding:18px 20px;transition:box-shadow .15s,border-color .15s}
  .app-kartya:hover{box-shadow:var(--arnyek-m);border-color:var(--keret-eros)}
  .app-fej{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}

function csvTabla(adat){
  const sorok = adat.trim().split(/\r?\n/).filter(Boolean);
  if(!sorok.length) return '';
  const sep = (sorok[0].includes(';') && !sorok[0].includes(',')) ? ';' : ',';
  const cella = s => s.split(sep).map(c => esc(c.trim()));
  const fej = cella(sorok[0]);
  return '<table class="md-tabla"><thead><tr>' + fej.map(c=>'<th>'+c+'</th>').join('') +
    '</tr></thead><tbody>' + sorok.slice(1).map(s=>'<tr>'+cella(s).map(c=>'<td>'+c+'</td>').join('')+'</tr>').join('') +
    '</tbody></table>';
}

function miniMd(szoveg, mellek){
  if(!szoveg) return '<span class="ures">— nincs kitöltve —</span>';
  /* 1. kerített blokkok és melléklet-hivatkozások kiemelése helyőrzőkkel */
  const blokkok = [];
  let forras = szoveg.replace(/```(\w*)\n([\s\S]*?)```/g, (_, nyelv, kod) => {
    blokkok.push({nyelv: nyelv || 'kod', kod});
    return '\u0000BLOKK' + (blokkok.length-1) + '\u0000';
  });
  forras = forras.replace(/!\[([^\]]*)\]\(melleklet:([\w-]+)\)/g, (_, alt, id) => {
    blokkok.push({nyelv:'mell', alt, id});
    return '\u0000BLOKK' + (blokkok.length-1) + '\u0000';
  });
  const bek = esc(forras).split(/\n\s*\n/);
  let kimenet = bek.map(b => {
    const sorok = b.split('\n').map(s => s.trim()).filter(Boolean);
    if(!sorok.length) return '';
    /* GFM táblázat: minden sor | jellel kezdődik */
    if(sorok.length >= 2 && sorok.every(s => s.startsWith('|'))){
      const cellak = s => s.replace(/^\||\|$/g,'').split('|').map(c=>c.trim());
      const fej = cellak(sorok[0]);
      const torzs = sorok.slice(/^\|[\s:\-|]+\|$/.test(sorok[1]) ? 2 : 1).map(cellak);
      return '<table class="md-tabla"><thead><tr>' + fej.map(c=>'<th>'+c+'</th>').join('') +
        '</tr></thead><tbody>' + torzs.map(s=>'<tr>'+s.map(c=>'<td>'+c+'</td>').join('')+'</tr>').join('') +
        '</tbody></table>';
    }
    if(sorok.every(s => /^\d+\./.test(s)))
      return '<ol>' + sorok.map(s => '<li>' + s.replace(/^\d+\.\s*/, '') + '</li>').join('') + '</ol>';
    if(sorok.every(s => /^[•\-]/.test(s)))
      return '<ul>' + sorok.map(s => '<li>' + s.replace(/^[•\-]\s*/, '') + '</li>').join('') + '</ul>';
    return '<p>' + sorok.join('<br>') + '</p>';
  }).join('');
  /* 2. helyőrzők visszacserélése renderelt blokkokra */
  kimenet = kimenet.replace(/\u0000BLOKK(\d+)\u0000/g, (_, i) => {
    const b = blokkok[+i];
    if(b.nyelv === 'mell'){
      const m = (mellek||[]).find(x => x.id === b.id);
      return m ? mellekletHtml(m, b.alt) : '<span class="ures">[hiányzó melléklet: '+esc(b.id)+']</span>';
    }
    if(b.nyelv === 'mermaid')
      return '<div class="md-mermaid"><pre class="mermaid">' + esc(b.kod) + '</pre>' +
             '<div class="md-mermaid-fallback">Mermaid diagram — a rendereléshez internetkapcsolat szükséges (CDN).</div></div>';
    return '<pre class="md-kod" data-nyelv="' + esc(b.nyelv) + '"><code>' + esc(b.kod) + '</code></pre>';
  });
  return kimenet;
}

function kapcsCelLista(sajatKulcs){

    .map(e => ({kulcs:e.kulcs, nev:e.cim, csoport:'Elemek'}));
  const szab = Object.entries(SZABALYZATOK)
    .map(([k,v]) => ({kulcs:k, nev:v.nev, csoport:'Szabályzatok'}));
  return [...elemek, ...szab];
}
function kapcsCelNev(kulcs){
  const e = elemByKulcs(kulcs); if(e) return e.cim;
  const sz = SZABALYZATOK[kulcs]; if(sz) return sz.nev;
  return '';
}

/* ---- Kapcsolat-validáció. Visszatér: null = OK, vagy hibaszöveg ---- */
function kapcsValidal(forras, cel, fajta){
  if(!cel) return 'Válassz célt.';
  if(!fajta) return 'Válassz kapcsolat-fajtát.';
  if(forras === cel) return 'Az elem nem kapcsolódhat önmagához.';
  if(!elemByKulcs(cel) && !SZABALYZATOK[cel]) return 'A megadott cél nem létezik.';
  if(KAPCSOLATOK.some(k => k.forras===forras && k.cel===cel && k.fajta===fajta))
    return 'Ez a kapcsolat már létezik.';
  // irányított ellentmondás: pl. ha B már leváltja A-t, A ne válthassa le B-t
  const ford = KAPCS_ELLENTMOND[fajta];
  if(ford && KAPCSOLATOK.some(k => k.forras===cel && k.cel===forras && k.fajta===ford))
    return `Ellentmondás: a(z) ${cel} már „${ford}" kapcsolatban áll ezzel az elemmel.`;
  return null;
}

function lehetsegesMuveletek(elem, ver){
  const m = [];
  const ujabbAktiv = elem.verziok.some(x => x.v > ver.v && !['Elvetve','Archivált'].includes(x.statusz));
  if(ver.statusz === 'Vázlat'){
    m.push({label:'Beküldés véleményezésre', szerep:'Szerző', akcio:'bekuldes'});
    m.push({label:'Elvetés', szerep:'Szerző', akcio:'elvetes', veszelyes:true});
  }
  if(ver.statusz === 'Véleményezés'){
    m.push({label:'Jóváhagyás…', szerep:'Jóváhagyó', akcio:'jovahagyas'});
    m.push({label:'Visszadobás…', szerep:'Jóváhagyó', akcio:'visszadobas', veszelyes:true});
  }
  if((ver.statusz === 'Jóváhagyott' || ver.statusz === 'Hatályos') && !ujabbAktiv){
    m.push({label:'Új verzió nyitása (v' + (Math.max(...elem.verziok.map(x=>x.v))+1) + ')', szerep:'Szerző', akcio:'ujverzio', masodlagos:true});
  }
  if(ver.statusz === 'Hatályos'){
    m.push({label:'Kivezetés…', szerep:'Admin', akcio:'kivezetes', veszelyes:true});
  }
  if(ver.statusz === 'Elavult'){
    m.push({label:'Archiválás', szerep:'Admin', akcio:'archivalas', masodlagos:true});
  }
  return m;
}

/* ============ ÜTEMEZŐ ============ */
function utemezoFut(){
  const ma = simDatum();
  let valtozas = 0;
  ELEMEK.forEach(elem => {
    /* 1) Jóváhagyott → Hatályos, ha a kezdődátum elérve */
    elem.verziok.forEach(ver => {
      if(ver.statusz === 'Jóváhagyott' && ver.hatalyKezdet && ver.hatalyKezdet <= ma){
        /* a korábbi hatályos verzió leváltása: végdátum = új kezdete */
        elem.verziok.forEach(regi => {
          if(regi !== ver && regi.statusz === 'Hatályos'){
            regi.hatalyVeg = ver.hatalyKezdet;
            naploz(regi, 'Hatályos', 'Elavult', 'RENDSZER', 'leváltotta: v' + ver.v);
            valtozas++;
          }
        });
        naploz(ver, 'Jóváhagyott', 'Hatályos', 'RENDSZER', 'kezdődátum elérve');
        valtozas++;
      }
    });
    /* 2) Hatályos → Elavult, ha a végdátum lejárt */
    elem.verziok.forEach(ver => {
      if(ver.statusz === 'Hatályos' && ver.hatalyVeg && ver.hatalyVeg < ma){
        naploz(ver, 'Hatályos', 'Elavult', 'RENDSZER', 'végdátum elérve');
        valtozas++;
      }
    });
  });
  toast(valtozas ? 'Ütemező lefutott: ' + valtozas + ' automatikus átmenet (' + datumHu(ma) + ')'
                 : 'Ütemező lefutott: nincs esedékes átmenet (' + datumHu(ma) + ')');
  render();
}

/* ============ MŰVELETEK ============ */
function muvelet(akcio){
  const elem = elemByKulcs(kivalasztottKulcs);
  const ver = megjelenitendoVerzio(elem);
  if(akcio === 'bekuldes'){
    naploz(ver, 'Vázlat', 'Véleményezés', szerepkor());
    toast(elem.kulcs + ' v' + ver.v + ' beküldve véleményezésre'); render();
  }
  if(akcio === 'elvetes'){
    modalNyit('Elvetés', `
      <p style="font-size:13px">Az elem <b>Elvetve</b> végállapotba kerül. Fizikai törlés nincs — az auditnyom megmarad.</p>
      <label>Indoklás (opcionális)</label><textarea id="mIndok"></textarea>`,
      () => { naploz(ver, 'Vázlat', 'Elvetve', szerepkor(), $('#mIndok').value); toast(elem.kulcs + ' v' + ver.v + ' elvetve'); });
  }
  if(akcio === 'visszadobas'){
    modalNyit('Visszadobás javításra', `
      <label>Indoklás (kötelező)</label><textarea id="mIndok"></textarea>
      <div class="hiba" id="mHiba">Az indoklás megadása kötelező.</div>`,
      () => {
        const i = $('#mIndok').value.trim();
        if(!i){ $('#mHiba').style.display='block'; return false; }
        naploz(ver, 'Véleményezés', 'Vázlat', szerepkor(), i);
        toast(elem.kulcs + ' v' + ver.v + ' visszadobva Vázlatba');
      });
  }
  if(akcio === 'jovahagyas'){
    modalNyit('Jóváhagyás és hatályosság', `
      <label>Hatályosság kezdete (kötelező)</label>
      <input type="date" id="mKezdet" value="${simDatum()}">
      <div class="jelolo"><input type="checkbox" id="mVisszavonasig" checked><span>Visszavonásig hatályos (nincs végdátum)</span></div>
      <label>Hatályosság vége</label>
      <input type="date" id="mVeg" disabled>
      <div class="hiba" id="mHiba"></div>`,
      () => {
        const k = $('#mKezdet').value;
        const visszavonasig = $('#mVisszavonasig').checked;
        const v = visszavonasig ? null : $('#mVeg').value;
        const hiba = $('#mHiba');
        if(!k){ hiba.textContent='A kezdődátum kötelező.'; hiba.style.display='block'; return false; }
        if(!visszavonasig && !v){ hiba.textContent='Adj meg végdátumot, vagy jelöld a „visszavonásig” opciót.'; hiba.style.display='block'; return false; }
        if(v && v <= k){ hiba.textContent='A végdátumnak a kezdődátum után kell lennie.'; hiba.style.display='block'; return false; }
        ver.hatalyKezdet = k; ver.hatalyVeg = v;
        naploz(ver, 'Véleményezés', 'Jóváhagyott', szerepkor(), 'hatály: ' + k + ' – ' + (v || 'visszavonásig'));
        toast(elem.kulcs + ' v' + ver.v + ' jóváhagyva — a hatályba lépést az ütemező végzi');
      },
      () => {
        $('#mVisszavonasig').addEventListener('change', e => { $('#mVeg').disabled = e.target.checked; if(e.target.checked) $('#mVeg').value=''; });
      });
  }
  if(akcio === 'ujverzio'){
    const ujV = Math.max(...elem.verziok.map(x=>x.v)) + 1;
    elem.verziok.push({
      v:ujV, statusz:'Vázlat',
      rovid:ver.rovid, leiras:ver.leiras, elofeltetelek:ver.elofeltetelek,
      kriteriumok:ver.kriteriumok, cia:ver.cia ? {...ver.cia} : null,
      hatalyKezdet:null, hatalyVeg:null,
      letrehozva:simDatum(), modositotta:szerepkor(),
      naplo:[{mikor:simDatum(), ki:szerepkor(), honnan:'—', hova:'Vázlat', megj:'új verzió nyitása (v'+ver.v+' alapján)'}]
    });
    kivalasztottVerzio = ujV;
    toast(elem.kulcs + ' v' + ujV + ' létrejött Vázlat státuszban — a v' + ver.v + ' változatlanul ' + ver.statusz.toLowerCase());
    render();
  }
  if(akcio === 'kivezetes'){
    modalNyit('Kivezetés', `
      <p style="font-size:13px">A verzió <b>Elavult</b> státuszba kerül. A végdátum rögzítésre kerül a hatályosságban.</p>
      <label>Hatályosság vége</label><input type="date" id="mVeg" value="${simDatum()}">
      <div class="hiba" id="mHiba"></div>`,
      () => {
        const v = $('#mVeg').value;
        if(!v){ $('#mHiba').textContent='A végdátum kötelező.'; $('#mHiba').style.display='block'; return false; }
        if(ver.hatalyKezdet && v <= ver.hatalyKezdet){ $('#mHiba').textContent='A végdátumnak a kezdődátum után kell lennie.'; $('#mHiba').style.display='block'; return false; }
        ver.hatalyVeg = v;
        naploz(ver, 'Hatályos', 'Elavult', szerepkor(), 'kézi kivezetés');
        toast(elem.kulcs + ' v' + ver.v + ' kivezetve');
      });
  }
  if(akcio === 'archivalas'){
    naploz(ver, 'Elavult', 'Archivált', szerepkor());
    toast(elem.kulcs + ' v' + ver.v + ' archiválva — végállapot'); render();
  }
}

const PIPA = '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>';
const FOLYAM = ['Vázlat','Véleményezés','Jóváhagyott','Hatályos','Elavult','Archivált'];
const ST_SZIN = {'Vázlat':['#5C6677','#EEF1F5'],'Véleményezés':['#A65200','#FFF3E3'],
  'Jóváhagyott':['#065E90','#E9F4FC'],'Hatályos':['#066E2B','#E7F8EE'],
  'Elavult':['#5A6372','#E3E6EC'],'Archivált':['#373D49','#E3E6EC']};
const TABOK = [
  {kulcs:'', nev:'Mind', statuszok:null},
  {kulcs:'hatalyos', nev:'Hatályos', statuszok:['Hatályos']},
  {kulcs:'folyamatban', nev:'Folyamatban', statuszok:['Vázlat','Véleményezés','Jóváhagyott']},
  {kulcs:'lezart', nev:'Lezárt', statuszok:['Elavult','Archivált','Elvetve']}

function tabTalalat(elem, tab){
  if(!tab.statuszok) return true;
  return elem.verziok.some(v => tab.statuszok.includes(v.statusz));
}

function renderTabok(){
  $('#statuszTabok').innerHTML = TABOK.map(t => {
    const db = ELEMEK.filter(e => tabTalalat(e, t)).length;
    return `<button class="${statuszSzuroErtek===t.kulcs?'aktiv':''}" data-tab="${t.kulcs}">${t.nev}<span class="db">${db}</span></button>`;
  }).join('');
  document.querySelectorAll('[data-tab]').forEach(b => b.onclick = () => { statuszSzuroErtek = b.dataset.tab; render(); });
}

function renderTipusSzurok(){
  $('#tipusSzurok').innerHTML = Object.keys(TIPUSOK).map(k =>
    `<button class="chip ${tipusSzuro.has(k)?'aktiv':''}" data-tipus="${k}" title="${TIPUSOK[k].nev}">${k}</button>`
  ).join('');
  document.querySelectorAll('[data-tipus]').forEach(b => b.onclick = () => {
    tipusSzuro.has(b.dataset.tipus) ? tipusSzuro.delete(b.dataset.tipus) : tipusSzuro.add(b.dataset.tipus);
    render();

}

  }).join('') : `<div class="lista-ures">Nincs a szűrésnek megfelelő elem.<br>Módosítsd a keresést vagy a szűrőket.</div>`;

function stepperHtml(ver){
  if(ver.statusz === 'Elvetve')
    return `<div class="stepper-elvetve"><span class="badge nagy b-Elvetve">Elvetve</span>
      <span style="color:var(--t-halk);font-weight:500">Végállapot — az auditnyom megmaradt, az elem nem szerkeszthető.</span></div>`;
  const akt = FOLYAM.indexOf(ver.statusz);
  let html = '<div class="stepper">';
  FOLYAM.forEach((st, i) => {
    if(i > 0){
      const auto = (FOLYAM[i]==='Hatályos' || FOLYAM[i]==='Elavult');
      html += `<div class="osszekoto ${i<=akt?'kesz':''}">${auto?'<span class="auto-cimke">AUTO</span>':''}</div>`;
    }
    const allapot = i < akt ? 'kesz' : (i === akt ? 'aktualis' : '');
    const [szin,tint] = ST_SZIN[st];
    html += `<div class="lepes ${allapot}" ${allapot==='aktualis'?`style="--st-szin:${szin};--st-tint:${tint}"`:''}>
      <span class="pont">${allapot==='kesz'?PIPA:''}</span>
      <span class="felirat">${st}</span></div>`;
  });
  return html + '</div>';
}

/* ============ KAPCSOLATI GRÁF ============ */
const EL_STILUS = {
  'lebontja':  {szin:'#4258ED', dash:'',     v:2,   leiras:'lebontási hierarchia'},
  'függ tőle': {szin:'#A65200', dash:'7 4',  v:2,   leiras:'megvalósítási függés'},
  'hivatkozik':{szin:'#5C6677', dash:'2 5',  v:2,   leiras:'informális hivatkozás'},
  'megfelel':  {szin:'#065E90', dash:'11 4', v:2,   leiras:'szabályzat-megfelelés'},
  'leváltja':  {szin:'#D6220F', dash:'',     v:2.6, leiras:'kivezetés / utód'}
};
const GW = 178, GH = 52, GX = 212, GY = 152;

function grafSzintAlap(t){ return {BUS:0, F:1, TUC:1, TUS:2, BD:3, TD:3}[t] ?? 2; }

function renderGraf(){
  const mindFajta = Object.keys(EL_STILUS);
  const aktivFajtak = grafFajtak || new Set(mindFajta);

  /* élek és csomópontok összegyűjtése */
  let elek = KAPCSOLATOK.filter(k => aktivFajtak.has(k.fajta));
  let kulcsok = new Set();
  if(grafHatokor === 'kornyezet' && kivalasztottKulcs){
    elek = elek.filter(k => k.forras === kivalasztottKulcs || k.cel === kivalasztottKulcs);
    kulcsok.add(kivalasztottKulcs);
  } else {
    ELEMEK.forEach(e => kulcsok.add(e.kulcs));
    Object.keys(SZABALYZATOK).forEach(k => kulcsok.add(k));
  }
  elek.forEach(k => { kulcsok.add(k.forras); kulcsok.add(k.cel); });

  const csomok = {};
  kulcsok.forEach(k => {
    const e = elemByKulcs(k);
    if(e) csomok[k] = {kulcs:k, cim:e.cim, statusz:elsodlegesVerzio(e).statusz,
                       szint:grafSzintAlap(e.tipus), szab:false};
    else if(SZABALYZATOK[k]) csomok[k] = {kulcs:k, cim:SZABALYZATOK[k].nev, statusz:null, szint:4, szab:true};
  });
  /* lebontási kényszer: a gyerek mindig mélyebbre kerül a szülőnél */
  for(let i=0;i<4;i++) elek.forEach(k => {
    if(k.fajta==='lebontja' && csomok[k.forras] && csomok[k.cel])
      csomok[k.cel].szint = Math.max(csomok[k.cel].szint, csomok[k.forras].szint+1);
  });

  /* szintenkénti rendezés (2 barycenter-menet a keresztezések ellen) */
  const szintek = {};
  Object.values(csomok).forEach(cs => (szintek[cs.szint] = szintek[cs.szint]||[]).push(cs));
  Object.values(szintek).forEach(s => s.sort((a,b)=>a.kulcs.localeCompare(b.kulcs)));
  const xOf = cs => cs._x ?? 0;
  for(let menet=0;menet<2;menet++){
    Object.keys(szintek).sort((a,b)=>a-b).forEach(L => {
      const sor = szintek[L];
      sor.forEach((cs,i)=>cs._x=i);
      sor.forEach(cs => {
        const szomszed = elek.filter(k=>k.forras===cs.kulcs||k.cel===cs.kulcs)
          .map(k => csomok[k.forras===cs.kulcs?k.cel:k.forras]).filter(Boolean);
        cs._b = szomszed.length ? szomszed.reduce((s,n)=>s+xOf(n),0)/szomszed.length : cs._x;
      });
      sor.sort((a,b)=>a._b-b._b).forEach((cs,i)=>cs._x=i);
    });
  }
  Object.values(szintek).forEach(sor => sor.forEach((cs,i) => {
    cs.x = (i-(sor.length-1)/2)*GX - GW/2;
    cs.y = cs.szint*GY;
  }));

  /* kiterjedés + nézetdoboz */
  const xs = Object.values(csomok).map(c=>c.x), ys = Object.values(csomok).map(c=>c.y);
  const ext = xs.length ? {x:Math.min(...xs)-60, y:Math.min(...ys)-50,
    w:Math.max(...xs)-Math.min(...xs)+GW+120, h:Math.max(...ys)-Math.min(...ys)+GH+110}
    : {x:-200,y:-50,w:400,h:200};
  if(!vbGraf) vbGraf = {...ext};

  /* élek rajzolása */
  const utak = elek.map((k,i) => {
    const s = csomok[k.forras], t = csomok[k.cel];
    if(!s||!t) return '';
    const st = EL_STILUS[k.fajta];
    let d;
    if(s.szint === t.szint){
      const [b,j] = s.x < t.x ? [s,t] : [t,s];
      d = `M ${b.x+GW} ${b.y+GH/2} C ${b.x+GW+58} ${b.y-52}, ${j.x-58} ${j.y-52}, ${j.x} ${j.y+GH/2}`;
      if(s.x > t.x) d = `M ${s.x} ${s.y+GH/2} C ${s.x-58} ${s.y-52}, ${t.x+GW+58} ${t.y-52}, ${t.x+GW} ${t.y+GH/2}`;
    } else {
      const [f,a] = s.szint < t.szint ? [s,t] : [t,s];
      const fx=f.x+GW/2, ax=a.x+GW/2, koz=(f.y+GH+a.y)/2;
      d = s.szint < t.szint
        ? `M ${fx} ${f.y+GH} C ${fx} ${koz}, ${ax} ${koz}, ${ax} ${a.y}`
        : `M ${ax} ${a.y} C ${ax} ${koz}, ${fx} ${koz}, ${fx} ${f.y+GH}`;
      if(s.szint > t.szint) d = `M ${s.x+GW/2} ${s.y} C ${s.x+GW/2} ${koz}, ${t.x+GW/2} ${koz}, ${t.x+GW/2} ${t.y+GH}`;
    }
    return `<path class="graf-el" data-f="${k.forras}" data-c="${k.cel}" d="${d}" fill="none"
      stroke="${st.szin}" stroke-width="${st.v}" ${st.dash?`stroke-dasharray="${st.dash}"`:''}
      marker-end="url(#ny-${mindFajta.indexOf(k.fajta)})"><title>${k.forras} —${k.fajta}→ ${k.cel}</title></path>`;
  }).join('');

  /* csomópontok */
  const dobozok = Object.values(csomok).map(cs => {
    const szin = cs.szab ? '#5C6677' : (ST_SZIN[cs.statusz]||['#D6220F'])[0];
    const cim = cs.cim.length>24 ? cs.cim.slice(0,23)+'…' : cs.cim;
    const kij = cs.kulcs===kivalasztottKulcs;
    return `<g class="graf-cs ${kij?'kijelolt':''}" data-graf-kulcs="${cs.kulcs}" transform="translate(${cs.x},${cs.y})">
      <rect width="${GW}" height="${GH}" rx="11" fill="#fff" ${cs.szab?'stroke-dasharray="5 4"':''}
        stroke="${kij?'#4258ED':'#D3D9E3'}" stroke-width="${kij?2.4:1.4}"/>
      ${cs.szab?'':`<rect x="0" y="10" width="4" height="${GH-20}" rx="2" fill="${szin}"/>`}
      <text x="14" y="20" font-family="ui-monospace,Consolas,monospace" font-size="10" fill="#5C6677">${cs.kulcs}</text>
      <text x="14" y="38" font-size="11.5" font-weight="600" fill="#16191F">${esc(cim)}</text>
      ${cs.statusz?`<circle cx="${GW-13}" cy="14" r="4.5" fill="${szin}"><title>${cs.statusz}</title></circle>`:''}
      <title>${cs.kulcs} — ${esc(cs.cim)}${cs.statusz?' ('+cs.statusz+')':''}</title>
    </g>`;
  }).join('');

  const markerek = mindFajta.map((f,i) =>
    `<marker id="ny-${i}" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
       <path d="M0 0 L10 5 L0 10 z" fill="${EL_STILUS[f].szin}"/></marker>`).join('');

  const fajtaChipek = mindFajta.map(f => `
    <button class="chip graf-chip ${aktivFajtak.has(f)?'aktiv':''}" data-graf-fajta="${f}">
      <span class="vonal-minta" style="--c:${EL_STILUS[f].szin};${EL_STILUS[f].dash?'--d:'+EL_STILUS[f].dash.replace(' ',','):''}"></span>${f}
    </button>`).join('');

  $('#fo').innerHTML = `<div class="graf-wrap">
    <div class="graf-eszkoztar">
      <span class="graf-cim">Kapcsolati gráf</span>
      <div class="szegmens graf-szeg">
        <button class="${grafHatokor==='mind'?'aktiv':''}" data-hatokor="mind">Teljes gráf</button>
        <button class="${grafHatokor==='kornyezet'?'aktiv':''}" data-hatokor="kornyezet" ${kivalasztottKulcs?'':'disabled title="Előbb jelölj ki elemet a listában"'}>Kijelölt környezete</button>
      </div>
      <div class="szuro-sor" style="flex:1">${fajtaChipek}</div>
      <button class="gomb halk" id="btnGrafIlleszt" title="A teljes gráf bekeretezése">Középre igazítás</button>
    </div>
    <svg id="grafSvg" viewBox="${vbGraf.x} ${vbGraf.y} ${vbGraf.w} ${vbGraf.h}" role="img"
      aria-label="Kapcsolati gráf: ${Object.keys(csomok).length} elem, ${elek.length} kapcsolat">
      <defs>${markerek}</defs>
      ${utak}${dobozok}
    </svg>
    <div class="graf-jelmagyarazat">
      <b>Jelmagyarázat</b>
      ${mindFajta.map(f=>`<span><i class="vonal-minta" style="--c:${EL_STILUS[f].szin};${EL_STILUS[f].dash?'--d:'+EL_STILUS[f].dash.replace(' ',','):''}"></i>${f} — ${EL_STILUS[f].leiras}</span>`).join('')}
      <span><i class="pont-minta"></i>bal sáv és pötty: az elem státuszának színe · szaggatott keret: külső szabályzat</span>
      <span class="halk">Kattints egy elemre a kartotékjához · görgetés: nagyítás · húzás: mozgatás</span>
    </div>
  </div>`;

  /* interakciók */
  document.querySelectorAll('[data-hatokor]').forEach(b => b.onclick = () => { grafHatokor=b.dataset.hatokor; vbGraf=null; render(); });
  document.querySelectorAll('[data-graf-fajta]').forEach(b => b.onclick = () => {
    const s = grafFajtak || new Set(mindFajta);
    s.has(b.dataset.grafFajta) ? s.delete(b.dataset.grafFajta) : s.add(b.dataset.grafFajta);
    grafFajtak = s; render();
  });
  $('#btnGrafIlleszt').onclick = () => { vbGraf = null; render(); };
  document.querySelectorAll('[data-graf-kulcs]').forEach(g => {
    g.onclick = () => { kivalasztottKulcs = g.dataset.grafKulcs; kivalasztottVerzio = null;
      if(elemByKulcs(kivalasztottKulcs)){ grafNezet = false; $('#btnGraf').setAttribute('aria-pressed','false'); $('#btnGraf').classList.remove('aktiv'); }
      render(); };
    g.onmouseenter = () => {
      const k = g.dataset.grafKulcs;
      document.querySelectorAll('.graf-el').forEach(p => p.classList.toggle('tompa', p.dataset.f!==k && p.dataset.c!==k));
      const szomszed = new Set([k]);
      document.querySelectorAll('.graf-el').forEach(p => { if(p.dataset.f===k) szomszed.add(p.dataset.c); if(p.dataset.c===k) szomszed.add(p.dataset.f); });
      document.querySelectorAll('.graf-cs').forEach(n => n.classList.toggle('tompa', !szomszed.has(n.dataset.grafKulcs)));
    };
    g.onmouseleave = () => document.querySelectorAll('.tompa').forEach(x=>x.classList.remove('tompa'));
  });

  /* pan + zoom */
  const svg = $('#grafSvg');
  svg.addEventListener('wheel', ev => {
    ev.preventDefault();
    const k = ev.deltaY > 0 ? 1.12 : 1/1.12;
    const r = svg.getBoundingClientRect();
    const mx = vbGraf.x + (ev.clientX-r.left)/r.width*vbGraf.w;
    const my = vbGraf.y + (ev.clientY-r.top)/r.height*vbGraf.h;
    vbGraf = {x:mx-(mx-vbGraf.x)*k, y:my-(my-vbGraf.y)*k, w:vbGraf.w*k, h:vbGraf.h*k};
    svg.setAttribute('viewBox', `${vbGraf.x} ${vbGraf.y} ${vbGraf.w} ${vbGraf.h}`);
  }, {passive:false});
  let huzas = null;
  svg.addEventListener('pointerdown', ev => { if(ev.target.closest('.graf-cs')) return;
    huzas = {x:ev.clientX, y:ev.clientY}; svg.setPointerCapture(ev.pointerId); });
  svg.addEventListener('pointermove', ev => { if(!huzas) return;
    const r = svg.getBoundingClientRect();
    vbGraf.x -= (ev.clientX-huzas.x)/r.width*vbGraf.w;
    vbGraf.y -= (ev.clientY-huzas.y)/r.height*vbGraf.h;
    huzas = {x:ev.clientX, y:ev.clientY};
    svg.setAttribute('viewBox', `${vbGraf.x} ${vbGraf.y} ${vbGraf.w} ${vbGraf.h}`); });
  svg.addEventListener('pointerup', () => huzas = null);
}

    return `<div class="app-kartya">

    </div>`;

    SZOLGALTATASOK.map(s => `<button class="chip ${s.kod===kivalasztottSzolg?'aktiv':''}" data-szolg-valt="${s.kod}">${esc(s.kod)}</button>`).join('')

   : `<div class="szolg-valaszto"><button class="chip chip-uj" data-uj-szolg>+ Új szolgáltatás</button></div>`;

  $('#fo').innerHTML = `<div class="attekintes">
    ${szolgValaszto}
    <div class="szolg-fej">
      <div class="szolg-cimke">Üzleti szolgáltatás</div>
      <h2>${esc(szolg.nev)} <span class="kulcs-chip">${esc(szolg.kod)}</span></h2>
      <p>${esc(szolg.leiras)}</p>
      <div class="szolg-fej-gombok">
        <button class="gomb masodlagos" data-szolg-kartotek="${szolg.kod}">Szolgáltatás kartoték →</button>
      </div>
    </div>
    <div class="szolg-alcim-sor">
      <div class="szolg-alcim">Alkalmazások · ${sajatAlkok.length}</div>
      <button class="gomb elsodleges kicsi" data-uj-alk>+ Új alkalmazás</button>
    </div>
    <div class="app-racs">${appKartyak}</div>
  </div>`;
  document.querySelectorAll('[data-app-megnyit]').forEach(b => b.onclick = () => {
    alkSzuro = b.dataset.appMegnyit;
    const elso = ELEMEK.find(e => alkOf(e) === alkSzuro);
    kivalasztottKulcs = elso ? elso.kulcs : null; kartotekNezet = null;
    kivalasztottVerzio = null; render();
  });
  document.querySelectorAll('[data-szolg-valt]').forEach(b => b.onclick = () => { kivalasztottSzolg = b.dataset.szolgValt; render(); });
  document.querySelectorAll('[data-szolg-kartotek]').forEach(b => b.onclick = () => { kartotekNezet = {tipus:'szolg', kod:b.dataset.szolgKartotek}; kivalasztottKulcs = null; render(); });
  document.querySelectorAll('[data-alk-kartotek]').forEach(b => b.onclick = () => { kartotekNezet = {tipus:'alk', kod:b.dataset.alkKartotek}; kivalasztottKulcs = null; render(); });
  const ujSzolg = $('[data-uj-szolg]'); if(ujSzolg) ujSzolg.onclick = ujSzolgModal;
  const ujAlk = $('[data-uj-alk]'); if(ujAlk) ujAlk.onclick = () => ujAlkModal(kivalasztottSzolg);
}

/* ============ SZOLGÁLTATÁS MODÁL ============ */
function szolgModal(letezo){
  const cim = letezo ? 'Szolgáltatás szerkesztése' : 'Új szolgáltatás';
  modalNyit(cim, `
    <label>Kód${letezo?' <span style="font-weight:400">(nem módosítható)</span>':''}</label>
    <input type="text" id="mKod" placeholder="pl. FAIR" value="${letezo?esc(letezo.kod):''}" ${letezo?'disabled':''}>
    <label>Megnevezés</label><input type="text" id="mNev" value="${letezo?esc(letezo.nev):''}" placeholder="pl. FAIR üzleti szolgáltatás">
    <label>Leírás</label><textarea id="mLeiras">${letezo?esc(letezo.leiras):''}</textarea>
    <label>Felelős</label><input type="text" id="mFelelos" value="${letezo?esc(letezo.felelos||''):''}">
    <div class="hiba" id="mHiba"></div>
    ${!letezo?'<p style="font-size:11.5px;color:var(--t-leges);margin-top:10px">A kód az alkalmazások és elemek azonosítójának nem része, de a szolgáltatás egyedi rövid neve. Később nem változtatható.</p>':''}`,
    () => {
      const hiba = $('#mHiba'); const nev = $('#mNev').value.trim();
      if(!nev){ hiba.textContent='A megnevezés kötelező.'; hiba.style.display='block'; return false; }
      if(letezo){
        letezo.nev = nev; letezo.leiras = $('#mLeiras').value.trim(); letezo.felelos = $('#mFelelos').value.trim();
        letezo.modositotta = szerepkor();
        (letezo.naplo = letezo.naplo||[]).push({mikor:simDatum(), ki:szerepkor(), megj:'adatok módosítva'});
        toast('Szolgáltatás frissítve: ' + letezo.kod);
      } else {
        const kod = $('#mKod').value.trim();
        if(!/^[A-Za-z0-9_]+$/.test(kod)){ hiba.textContent='A kód csak betűt, számot és aláhúzást tartalmazhat (kötőjel nélkül).'; hiba.style.display='block'; return false; }
        if(szolgById(kod)){ hiba.textContent='Ez a szolgáltatás-kód már létezik.'; hiba.style.display='block'; return false; }
        SZOLGALTATASOK.push({kod, nev, leiras:$('#mLeiras').value.trim(), felelos:$('#mFelelos').value.trim(),

function alkModal(letezo, alapSzolg){
  const cim = letezo ? 'Alkalmazás szerkesztése' : 'Új alkalmazás';
  const szolgOpciok = SZOLGALTATASOK.map(s => `<option value="${esc(s.kod)}" ${
    (letezo?letezo.szolg:alapSzolg)===s.kod?'selected':''}>${esc(s.kod)} — ${esc(s.nev)}</option>`).join('');
  modalNyit(cim, `
    <label>Szolgáltatás</label><select id="mSzolg">${szolgOpciok}</select>
    <label>Kód${letezo?' <span style="font-weight:400">(nem módosítható — az elemek azonosítója erre épül)</span>':''}</label>
    <input type="text" id="mKod" placeholder="pl. 3R" value="${letezo?esc(letezo.kod):''}" ${letezo?'disabled':''}>
    <label>Megnevezés</label><input type="text" id="mNev" value="${letezo?esc(letezo.nev):''}" placeholder="pl. Rendezvényregisztrációs rendszer">
    <label>Leírás</label><textarea id="mLeiras">${letezo?esc(letezo.leiras):''}</textarea>
    <label>Rétegek <span style="font-weight:400">(vesszővel elválasztva)</span></label>
    <input type="text" id="mRetegek" value="${letezo?esc(letezo.retegek.join(', ')):''}" placeholder="pl. FE, Core">
    <label>Felelős</label><input type="text" id="mFelelos" value="${letezo?esc(letezo.felelos||''):''}">
    <label>Last release / version <span style="font-weight:400">(opcionális)</span></label>
    <div style="display:flex;gap:8px">
      <input type="text" id="mRelease" style="flex:1" value="${letezo?esc(letezo.lastRelease||''):''}" placeholder="R1 · 2026. 01. 01.">
      <input type="text" id="mVersion" style="flex:1" value="${letezo?esc(letezo.lastVersion||''):''}" placeholder="0.1.0">
    </div>
    <div class="hiba" id="mHiba"></div>
    ${!letezo?'<p style="font-size:11.5px;color:var(--t-leges);margin-top:10px">A kód lesz az elemazonosítók előtagja (pl. <b>'+'KÓD</b>-FE-TUS-001). Később nem módosítható.</p>':''}`,
    () => {
      const hiba = $('#mHiba'); const nev = $('#mNev').value.trim();
      const retegek = $('#mRetegek').value.split(',').map(s=>s.trim()).filter(Boolean);
      if(!nev){ hiba.textContent='A megnevezés kötelező.'; hiba.style.display='block'; return false; }
      if(letezo){
        letezo.szolg = $('#mSzolg').value; letezo.nev = nev; letezo.leiras = $('#mLeiras').value.trim();
        letezo.retegek = retegek; letezo.felelos = $('#mFelelos').value.trim();
        letezo.lastRelease = $('#mRelease').value.trim(); letezo.lastVersion = $('#mVersion').value.trim();
        letezo.modositotta = szerepkor();
        (letezo.naplo = letezo.naplo||[]).push({mikor:simDatum(), ki:szerepkor(), megj:'adatok módosítva'});
        toast('Alkalmazás frissítve: ' + letezo.kod);
      } else {
        const kod = $('#mKod').value.trim();
        if(!/^[A-Za-z0-9_]+$/.test(kod)){ hiba.textContent='A kód csak betűt, számot és aláhúzást tartalmazhat (kötőjel nélkül).'; hiba.style.display='block'; return false; }
        if(alkById(kod)){ hiba.textContent='Ez az alkalmazás-kód már létezik.'; hiba.style.display='block'; return false; }
        ALKALMAZASOK.push({kod, szolg:$('#mSzolg').value, nev, leiras:$('#mLeiras').value.trim(),
          retegek, lastRelease:$('#mRelease').value.trim(), lastVersion:$('#mVersion').value.trim(),
          felelos:$('#mFelelos').value.trim(), letrehozva:simDatum(), modositotta:szerepkor(),
          naplo:[{mikor:simDatum(), ki:szerepkor(), megj:'alkalmazás létrehozása'}]});
        kivalasztottSzolg = $('#mSzolg').value; kartotekNezet = {tipus:'alk', kod}; kivalasztottKulcs = null;
        toast('Létrejött az alkalmazás: ' + kod);
      }
    });

      $('#szerkElonezet').innerHTML = miniMd(ta.value, ver.mellekletek);
      if(window.mermaid){
        document.querySelectorAll('#szerkElonezet .md-mermaid-fallback').forEach(x=>x.remove());
        try{ mermaid.run({nodes: document.querySelectorAll('#szerkElonezet pre.mermaid')}); }catch(e){}
      }
    };
    ta.addEventListener('input', () => { clearTimeout(ido); ido = setTimeout(elonezet, 350); });
    elonezet();
    const beszur = txt => {
      const p = ta.selectionStart ?? ta.value.length;
      ta.value = ta.value.slice(0,p) + txt + ta.value.slice(ta.selectionEnd ?? p);
      ta.focus(); ta.selectionStart = ta.selectionEnd = p + txt.length;
      clearTimeout(ido); elonezet();
    };
    const SNIPPET = {
      tabla:  '\n\n| Fejléc 1 | Fejléc 2 |\n| --- | --- |\n| érték | érték |\n',
      mermaid:'\n\n```mermaid\nflowchart LR\n  A[Kezdet] --> B[Vége]\n```\n',
      kod:    '\n\n```json\n{\n  "kulcs": "érték"\n}\n```\n'
    };
    document.querySelectorAll('[data-snippet]').forEach(b => b.onclick = () => {
      if(b.dataset.snippet === 'mell'){
        const id = $('#szerkMellValaszto').value;
        const m = (ver.mellekletek||[]).find(x=>x.id===id);
        beszur(`\n\n![${m? m.nev : ''}](melleklet:${id})\n`);
      } else beszur(SNIPPET[b.dataset.snippet]);
    });
    $('#szerkMentes').onclick = () => {
      if(szerkMod==='vizualis' && wysiwygPeldany){
        try{ ta.value = wysiwygPeldany.storage.markdown.getMarkdown(); }catch(e){}
      }
      ver.rovid = $('#szerkRovid').value;
      ver.leiras = ta.value;
      const ef = $('#szerkElofeltetelek'); if(ef) ver.elofeltetelek = ef.value;
      const kr = $('#szerkKriteriumok'); if(kr) ver.kriteriumok = kr.value;
      ver.modositotta = szerepkor();
      wysiwygTeardown(); szerkeszt = null;
      toast(elem.kulcs + ' v' + ver.v + ' tartalma mentve'); render();
    };
    $('#szerkMegse').onclick = () => { wysiwygTeardown(); szerkeszt = null; render(); };

    /* --- Vizuális / Forrás mód-váltó --- */
    const modValto = $('#szerkModValto');
    if(modValto) modValto.querySelectorAll('[data-mod]').forEach(b => b.onclick = () => {
      const ujMod = b.dataset.mod;
      if(ujMod === szerkMod) return;
      if(szerkMod==='vizualis' && wysiwygPeldany){
        try{ ta.value = wysiwygPeldany.storage.markdown.getMarkdown(); }catch(e){}
      }
      wysiwygTeardown();
      szerkMod = ujMod;
      render();
    });

    /* --- Az előfeltétel/kritérium mezők is frissítsék az élő előnézetet (csak a leírásra, de a beírás közben ne vesszen el) --- */
    ['szerkElofeltetelek','szerkKriteriumok'].forEach(id => {
      const m = $('#'+id); if(m) m.addEventListener('input', ()=>{});
    });

    /* --- Vizuális szerkesztő mountolása, ha az van kiválasztva --- */
    if(szerkMod==='vizualis') wysiwygInit(ta, ver, elonezet);
  }
  /* --- Mellékletek --- */
  const mf = $('#mellFajl');
  if(mf) mf.addEventListener('change', () => {
    const f = mf.files[0]; if(!f) return;
    const r = new FileReader();
    const kep = f.type.startsWith('image/');
    const video = f.type.startsWith('video/');
    const fajta = kep ? 'kep' : (video ? 'video' : 'csv');
    r.onload = () => {
      (ver.mellekletek = ver.mellekletek || []).push({
        id:'M'+Date.now(), fajta, nev:f.name,
        adat:r.result, feltolto:szerepkor(), mikor:simDatum()});
      toast('Melléklet hozzáadva: '+f.name); render();
    };
    (kep || video) ? r.readAsDataURL(f) : r.readAsText(f);
  });
  const mfg = $('#mellFigma');
  if(mfg) mfg.onclick = () => modalNyit('Figma frame csatolása', `
    <p>Élesben a rendszer a megadott frame-ről <b>pillanatképet rögzít</b> a verzióhoz (Figma API), a link pedig az élő tervre mutat.</p>
    <label>Frame neve</label><input type="text" id="mFigmaNev" placeholder="pl. Regisztrációs űrlap — mobil">
    <label>Figma URL</label><input type="text" id="mFigmaUrl" placeholder="https://www.figma.com/design/…?node-id=…">
    <div class="hiba" id="mHiba"></div>`,
    () => {
      const nev = $('#mFigmaNev').value.trim(), url = $('#mFigmaUrl').value.trim();
      const hiba = $('#mHiba');
      if(!nev){ hiba.textContent='A név kötelező.'; hiba.style.display='block'; return false; }
      if(!/^https:\/\/(www\.)?figma\.com\//.test(url)){ hiba.textContent='Érvényes figma.com URL-t adj meg.'; hiba.style.display='block'; return false; }
      (ver.mellekletek = ver.mellekletek || []).push({
        id:'M'+Date.now(), fajta:'figma', nev, forrasUrl:url, kep:null,
        feltolto:szerepkor(), mikor:simDatum()});
      toast('Figma frame csatolva: '+nev);
    });
  document.querySelectorAll('[data-mellnez]').forEach(sor => sor.onclick = e => {
    if(e.target.closest('a')) return; // a ↗ link a saját dolgát végezze
    const id = sor.dataset.mellnez;
    const cel = document.querySelector('.mell-kep[data-mid="'+id+'"], .mell-figma[data-mid="'+id+'"], .mell-csv[data-mid="'+id+'"]');
    if(cel){ cel.scrollIntoView({behavior:'smooth', block:'center'}); cel.classList.add('mell-kiemel');
      setTimeout(()=>cel.classList.remove('mell-kiemel'), 1400); }
    else { toast('Ez a melléklet a leírásban jelenik meg, ha hivatkozod: ![…](melleklet:'+id+')'); }
  });
  /* --- Kapcsolat CRUD --- */
  document.querySelectorAll('[data-kt-cel]').forEach(b => b.onclick = () => {
    const cel = b.dataset.ktCel, fajta = b.dataset.ktFajta;
    const i = KAPCSOLATOK.findIndex(k => k.forras===elem.kulcs && k.cel===cel && k.fajta===fajta);
    if(i>=0){ KAPCSOLATOK.splice(i,1); toast('Kapcsolat törölve: '+fajta+' → '+cel); render(); }
  });
  const kapcsAddGomb = $('#kapcsAdd');
  if(kapcsAddGomb) kapcsAddGomb.onclick = () => {
    const celek = kapcsCelLista(elem.kulcs);
    const opt = celek.map(c => `<option value="${esc(c.kulcs)}">${esc(c.kulcs)} — ${esc(c.nev)} · ${c.csoport}</option>`).join('');
    const fopt = KAPCS_FAJTAK.map(f => `<option value="${f}">${f}</option>`).join('');
    modalNyit('Kapcsolat hozzáadása', `
      <p>Új kapcsolat a(z) <b>${esc(elem.kulcs)}</b> elemből.</p>
      <div class="kapcs-mezo-sor">
        <div><label>Fajta</label><select id="kFajta">${fopt}</select></div>
        <div><label>Cél</label><select id="kCel">${opt}</select></div>
      </div>
      <div class="hiba" id="kHiba"></div>`,
      () => {
        const fajta = $('#kFajta').value, cel = $('#kCel').value;
        const hiba = kapcsValidal(elem.kulcs, cel, fajta);
        if(hiba){ const h = $('#kHiba'); h.textContent = hiba; h.style.display='block'; return false; }
        KAPCSOLATOK.push({forras:elem.kulcs, cel, fajta});
        toast('Kapcsolat hozzáadva: '+fajta+' → '+cel);
      });
  };

  /* --- Címke chip-szerkesztő --- */
  const cimkeToggle = $('#cimkeToggle');
  if(cimkeToggle) cimkeToggle.onclick = () => { cimkeSzerk = !cimkeSzerk; render(); };
  document.querySelectorAll('[data-cimketorol]').forEach(b => b.onclick = () => {
    const i = parseInt(b.dataset.cimketorol, 10);
    if(i>=0 && i<elem.tagek.length){ elem.tagek.splice(i,1); render(); }
  });
  const cimkeUjBevitel = () => {
    const inp = $('#cimkeUj'); if(!inp) return;
    const ertek = inp.value.trim().replace(/[,;]+$/,'').trim();
    if(!ertek) return;
    if(elem.tagek.includes(ertek)){ toast('Ez a címke már szerepel.'); inp.value=''; return; }
    elem.tagek.push(ertek); render();
  };
  const cimkeHozzaadGomb = $('#cimkeHozzaad');
  if(cimkeHozzaadGomb) cimkeHozzaadGomb.onclick = cimkeUjBevitel;
  const cimkeInp = $('#cimkeUj');
  if(cimkeInp) cimkeInp.addEventListener('keydown', e => {
    if(e.key==='Enter' || e.key===','){ e.preventDefault(); cimkeUjBevitel(); }
  });
  document.querySelectorAll('[data-cimkejavaslat]').forEach(b => b.onclick = () => {
    const t = b.dataset.cimkejavaslat;
    if(!elem.tagek.includes(t)){ elem.tagek.push(t); render(); }
  });

  document.querySelectorAll('[data-morzsa]').forEach(b => b.onclick = () => {
    const m = b.dataset.morzsa;
    if(m === 'szolg'){ kartotekNezet = {tipus:'szolg', kod:szolgOfAlk(alkOf(elem))}; kivalasztottKulcs = null; kivalasztottVerzio = null; render(); return; }
    if(m === 'alk'){ kartotekNezet = {tipus:'alk', kod:alkOf(elem)}; kivalasztottKulcs = null; kivalasztottVerzio = null; render(); return; }
    // 'att' = áttekintés
    kivalasztottSzolg = szolgOfAlk(alkOf(elem)) || kivalasztottSzolg;
    kartotekNezet = null; kivalasztottKulcs = null; kivalasztottVerzio = null; render();
  });
}

/* ============ WYSIWYG (TipTap) ============ */
function wysiwygTeardown(){
  if(wysiwygPeldany){
    try{ wysiwygPeldany.destroy(); }catch(e){}
    wysiwygPeldany = null;
  }
}

function wysiwygForrasra(ta, uzenet){
  szerkMod = 'forras';
  const wm = document.getElementById('wysiwygMezo'); if(wm) wm.style.display='none';
  const fm = document.getElementById('forrasMezo'); if(fm) fm.style.display='';
  if(ta) ta.style.display='';
  const valto = document.getElementById('szerkModValto');
  if(valto){
    valto.querySelectorAll('[data-mod]').forEach(b=>b.classList.toggle('aktiv', b.dataset.mod==='forras'));
    const vizGomb = valto.querySelector('[data-mod="vizualis"]'); if(vizGomb) vizGomb.disabled = true;
  }
  if(fm && !document.getElementById('wysiwygHiba')){
    const d = document.createElement('div'); d.className='wysiwyg-hiba'; d.id='wysiwygHiba';
    d.textContent = uzenet;
    fm.parentNode.insertBefore(d, fm);
  }
}

async function wysiwygInit(ta, ver, elonezet){
  const cel = document.getElementById('wysiwyg');
  if(!cel || !ta) return;
  let tt = null;
  try{
    tt = await Promise.race([
      window.__tiptapReady,
      new Promise(r => setTimeout(()=>r(null), 6000))
    ]);
  }catch(e){ tt = null; }
  // időközben kiléphettünk vagy módot válthattunk
  if(!document.getElementById('wysiwyg') || szerkMod!=='vizualis') return;
  if(!tt || !tt.ok){
    wysiwygForrasra(ta, 'A vizuális szerkesztő nem érhető el (offline vagy a CDN nem töltött be). A Forrás (markdown) mód aktív — a tartalom így is teljesen szerkeszthető.');
    return;
  }
  try{
    const {Editor, StarterKit, Markdown, Table, TableRow, TableCell, TableHeader, Image, Link} = tt;
    const editor = new Editor({
      element: cel,
      extensions: [
        StarterKit,
        Markdown.configure({html:false, linkify:false, transformPastedText:true}),
        Table.configure({resizable:false}), TableRow, TableHeader, TableCell,
        Image.configure({inline:true, allowBase64:true}),
        Link.configure({openOnClick:false})
      ],
      content: ta.value || '',
      onUpdate: ({editor}) => {
        try{ ta.value = editor.storage.markdown.getMarkdown(); }catch(e){}
        clearTimeout(wysiwygInit._ido);
        wysiwygInit._ido = setTimeout(elonezet, 350);
      }
    });
    wysiwygPeldany = editor;
    try{ editor.commands.setContent(ta.value || '', false); }catch(e){}

    const eszkoz = document.getElementById('wysiwygEszkoz');
    const frissitAktiv = () => {
      if(!eszkoz) return;
      eszkoz.querySelectorAll('[data-cmd]').forEach(b => {
        const c = b.dataset.cmd; let a = false;
        try{
          if(c==='bold') a = editor.isActive('bold');
          else if(c==='italic') a = editor.isActive('italic');
          else if(c==='h1') a = editor.isActive('heading',{level:1});
          else if(c==='h2') a = editor.isActive('heading',{level:2});
          else if(c==='h3') a = editor.isActive('heading',{level:3});
          else if(c==='bullet') a = editor.isActive('bulletList');
          else if(c==='ordered') a = editor.isActive('orderedList');
          else if(c==='quote') a = editor.isActive('blockquote');
          else if(c==='code') a = editor.isActive('codeBlock');
        }catch(e){}
        b.classList.toggle('aktiv', a);
      });
    };
    if(eszkoz) eszkoz.querySelectorAll('[data-cmd]').forEach(b => b.onclick = () => {
      const c = b.dataset.cmd, ch = editor.chain().focus();
      if(c==='bold') ch.toggleBold().run();
      else if(c==='italic') ch.toggleItalic().run();
      else if(c==='h1') ch.toggleHeading({level:1}).run();
      else if(c==='h2') ch.toggleHeading({level:2}).run();
      else if(c==='h3') ch.toggleHeading({level:3}).run();
      else if(c==='bullet') ch.toggleBulletList().run();
      else if(c==='ordered') ch.toggleOrderedList().run();
      else if(c==='quote') ch.toggleBlockquote().run();
      else if(c==='code') ch.toggleCodeBlock().run();
      else if(c==='table') ch.insertTable({rows:2, cols:2, withHeaderRow:true}).run();
      else if(c==='link'){ const url = prompt('Hivatkozás URL-je:'); if(url) ch.extendMarkRange('link').setLink({href:url}).run(); }
      else if(c==='mell'){
        const sel = document.getElementById('szerkMellValaszto');
        const id = sel ? sel.value : ((ver.mellekletek||[])[0]||{}).id;
        const m = (ver.mellekletek||[]).find(x => x.id===id);
        if(m) editor.chain().focus().setImage({src:'melleklet:'+id, alt:m.nev}).run();
      }
      frissitAktiv();
    });
    editor.on('selectionUpdate', frissitAktiv);
    editor.on('transaction', frissitAktiv);
    frissitAktiv();
  }catch(e){
    wysiwygForrasra(ta, 'A vizuális szerkesztő indítása hibába ütközött — a Forrás (markdown) mód aktív.');
  }
}

function render(){ renderAlk(); renderTabok(); renderTipusSzurok(); renderLista(); if(grafNezet) renderGraf(); else renderKartya(); }

/* ============ ESEMÉNYEK ============ */
$('#kereso').addEventListener('input', e => { szovegSzuro = e.target.value; render(); });
$('#szerepkor').addEventListener('change', render);
$('#btnUtemezo').addEventListener('click', utemezoFut);
$('#btnUjElem').addEventListener('click', ujElemModal);
$('#btnAttekintes').addEventListener('click', () => { kivalasztottKulcs = null; kivalasztottVerzio = null; grafNezet = false; $('#btnGraf').classList.remove('aktiv'); $('#btnGraf').setAttribute('aria-pressed','false'); render(); });
$('#btnGraf').addEventListener('click', () => {
  grafNezet = !grafNezet; vbGraf = null;
  $('#btnGraf').classList.toggle('aktiv', grafNezet);
  $('#btnGraf').setAttribute('aria-pressed', String(grafNezet));
  render();
});
document.querySelector('.brand').style.cursor = 'pointer';
document.querySelector('.brand').addEventListener('click', () => { kivalasztottKulcs = null; alkSzuro=''; render(); });
document.addEventListener('keydown', e => {
  if((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'k'){ e.preventDefault(); $('#kereso').focus(); }
  if(e.key === 'Escape'){ $('#modalGyoker').innerHTML = ''; }
});

if(window.mermaid) mermaid.initialize({startOnLoad:false, theme:'neutral', fontFamily:'Inter'});
render();
</script>
